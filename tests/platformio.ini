[env:test]
platform = espressif32@6.0.0
board = twatch2020v3
framework = arduino

build_flags =
    -DPSRAM_SIZE=0x500000
    -DPSRAM_TYPE=PSRAM_TYPE_OCTAL
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLOAD_GLCD=1
    -DLILYGO_WATCH_HAS_DISPLAY
    -DLVGL_LITE=1
    -DLV_COLOR_DEPTH=16
    -DLV_MEM_SIZE=0x20000

lib_deps = 
    bodmer/TFT_eSPI@^2.5.37
    lvgl/lvgl@^7.7.2
    Xinyuan-LilyGO/AXP202X_Library@^1.1.0
    Xinyuan-LilyGO/TTGO_TWatch_Library@^1.0.0

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_unflags = 
    -Os

build_type = debug
