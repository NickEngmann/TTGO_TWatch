name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  native-tests:
    name: Native Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Run native tests
        run: pio test -e native -v

  lvgl-simulator:
    name: LVGL Simulator Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-lvgl-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Run LVGL headless tests
        env:
          SIM_SCREENSHOT_DIR: screenshots
        run: pio test -e native_lvgl -v

      - name: Convert PPM screenshots to PNG
        if: always()
        run: |
          sudo apt-get install -y netpbm
          cd screenshots
          for f in *.ppm; do
            [ -f "$f" ] && pnmtopng "$f" > "${f%.ppm}.png" 2>/dev/null || true
          done

      - name: Upload simulator screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lvgl-simulator-screenshots
          path: screenshots/*.png
          if-no-files-found: ignore

  esp32-build:
    name: ESP32 Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-esp32-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Install NimBLE dependency
        run: pio pkg install -e esp32 --library "h2zero/NimBLE-Arduino@^2.1.2"

      - name: Build ESP32 firmware
        id: build
        run: pio run -e esp32 2>&1 || echo "build_failed=true" >> "$GITHUB_OUTPUT"

      - name: Report build status
        run: |
          if [ "${{ steps.build.outputs.build_failed }}" = "true" ]; then
            echo "::warning::ESP32 build failed — expected without T-Watch board package (BMA423.h)"
            echo "The BMA423 accelerometer library is bundled with the LilyGo T-Watch BSP."
            echo "Native unit tests validate all portable logic independently."
          else
            echo "ESP32 build succeeded!"
          fi
