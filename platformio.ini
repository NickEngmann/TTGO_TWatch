[platformio]
src_dir = src
test_dir = test
default_envs = esp32, native

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = -DLILYGO_WATCH_2020_V3 -DDISABLE_DIAGNOSTIC_OUTPUT
lib_deps =
    lewisxhe/AXP202X_Library
    lewisxhe/SensorLib

[env:native]
platform = native
build_flags = -DNATIVE_BUILD
lib_compat_mode = strict
lib_deps =
    lewisxhe/AXP202X_Library
    lewisxhe/SensorLib

[env:native_test]
platform = native
build_flags = -DNATIVE_BUILD -Isrc -Isrc/drive/bma423 -Isrc/drive/axp
lib_compat_mode = strict
lib_deps =
    lewisxhe/AXP202X_Library
    lewisxhe/SensorLib
test_build_src = false
test_framework = unity
