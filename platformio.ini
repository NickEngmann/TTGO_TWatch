;PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = src
test_dir = test/test_native

[env:esp32dev]
platform = espressif32
board = ttgo-t-watch
framework = arduino

upload_speed = 2000000
monitor_speed = 115200

build_flags = 
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MISO=-1
    -DTFT_MOSI=19
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=27
    -DTFT_RST=-1
    -DLOAD_GLCD=1
    -DSPI_FREQUENCY=27000000
    -DLILYGO_WATCH_HAS_DISPLAY
    -DLILYGO_WATCH_HAS_AXP202
    -DLILYGO_WATCH_HAS_BUTTON
    -DLILYGO_WATCH_HAS_BMA423
    -DLILYGO_WATCH_HAS_MPU6050
    -DLILYGO_WATCH_HAS_PCF8563
    -DLILYGO_WATCH_HAS_TOUCH
    -DLILYGO_WATCH_2020_V3

lib_deps = 
    TFT_eSPI@>=2.2.17
    bblanchon/ArduinoJson@^6.18.5


[env:native]
platform = native
framework = arduino
build_flags = 
    -DNATIVE_BUILD
    -DLILYGO_WATCH_HAS_DISPLAY
    -DLILYGO_WATCH_HAS_AXP202
    -DLILYGO_WATCH_HAS_BUTTON
    -DLILYGO_WATCH_HAS_BMA423
    -DLILYGO_WATCH_HAS_MPU6050
    -DLILYGO_WATCH_HAS_PCF8563
    -DLILYGO_WATCH_HAS_TOUCH
    -DLILYGO_WATCH_2020_V3
    -DARDUINO=10810

lib_deps =

test_build_src = true

[env:esp32dev_ble]
platform = espressif32
board = ttgo-t-watch
framework = arduino

upload_speed = 2000000
monitor_speed = 115200

build_flags = 
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MISO=-1
    -DTFT_MOSI=19
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=27
    -DTFT_RST=-1
    -DLOAD_GLCD=1
    -DSPI_FREQUENCY=27000000
    -DLILYGO_WATCH_HAS_DISPLAY
    -DLILYGO_WATCH_HAS_AXP202
    -DLILYGO_WATCH_HAS_BUTTON
    -DLILYGO_WATCH_HAS_BMA423
    -DLILYGO_WATCH_HAS_MPU6050
    -DLILYGO_WATCH_HAS_PCF8563
    -DLILYGO_WATCH_HAS_TOUCH
    -DLILYGO_WATCH_2020_V3
    -DLILYGO_WATCH_HAS_BLE

lib_deps = 
    TFT_eSPI@>=2.2.17
    bblanchon/ArduinoJson@^6.18.5
