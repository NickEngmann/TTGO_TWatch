[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = -DLILGO_WATCH_2020_V3 -DDISABLE_DIAGNOSTIC_OUTPUT
lib_deps =
    lewisxhe/AXP202X_Library
    lewisxhe/SensorLib

[env:native]
platform = native
build_flags = -DNATIVE_BUILD
lib_deps =
    lewisxhe/AXP202X_Library
    lewisxhe/SensorLib
build_src_flags = -DNATIVE_BUILD
test_libs =
    Unity
    lewisxhe/AXP202X_Library
    lewisxhe/SensorLib
src_dir = src
test_dir = test/test_native
