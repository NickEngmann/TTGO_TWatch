[platformio]
default_envs = native

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = -DDISABLE_DIAGNOSTIC_OUTPUT -DLILYGO_WATCH_2020_V3
lib_deps =
    lvgl/lvgl
    lewisxhe/TTGO TWatch Library

[env:native]
platform = native
build_flags = -DNATIVE_BUILD -std=c++17 -I src
test_build_src = true
build_src_filter = +<BleServer.cpp> +<BleServer.h> -<MPR121> -<BBQ10Keyboard> -<TTGO> -<MPR121.h> -<BBQ10Keyboard.h> -<TTGO.h> -<MPR121> -<BBQ10Keyboard> -<TTGO>
