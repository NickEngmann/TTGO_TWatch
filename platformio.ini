; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: upload speed, proto, port
;   Test options: test framework
;

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags = 
    -DLV_CONF_PATH="${PROJECT_DIR}/src/lv_conf.h"
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLILYGO_WATCH_LVGL
    -DLILYGO_WATCH_HAS_DISPLAY
    -DLILYGO_WATCH_HAS_TOUCH
    -DLILYGO_WATCH_HAS_BATTERY
    -DLILYGO_WATCH_HAS_I2C
    -DLILYGO_WATCH_HAS_MPU6050
    -DLILYGO_WATCH_HAS_BMA423
    -DLILYGO_WATCH_HAS_AXP192
    -DLILYGO_WATCH_HAS_RTC
    -DLILYGO_WATCH_HAS_TFT
    -DLILYGO_WATCH_HAS_SPEAKER
    -DLILYGO_WATCH_HAS_BLUETOOTH
    -DLILYGO_WATCH_HAS_WIFI
    -DLILYGO_WATCH_HAS_GPS
    -DLILYGO_WATCH_HAS_CAMERA

lib_deps = 
    lvgl/lvgl@^7.7.2
    TFT_eSPI
    PCF8563
    ESP32 BLE Arduino


[env:native]
platform = native
framework = native
board = dueUSB
build_flags = 
    -DLV_CONF_PATH="${PROJECT_DIR}/src/lv_conf.h"
    -DNATIVE_BUILD
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLILYGO_WATCH_LVGL
    -DLILYGO_WATCH_HAS_DISPLAY
    -DLILYGO_WATCH_HAS_TOUCH
    -DLILYGO_WATCH_HAS_BATTERY
    -DLILYGO_WATCH_HAS_I2C
    -DLILYGO_WATCH_HAS_MPU6050
    -DLILYGO_WATCH_HAS_BMA423
    -DLILYGO_WATCH_HAS_AXP192
    -DLILYGO_WATCH_HAS_RTC
    -DLILYGO_WATCH_HAS_TFT
    -DLILYGO_WATCH_HAS_SPEAKER
    -DLILYGO_WATCH_HAS_BLUETOOTH
    -DLILYGO_WATCH_HAS_WIFI
    -DLILYGO_WATCH_HAS_GPS
    -DLILYGO_WATCH_HAS_CAMERA

lib_deps = 
    lvgl/lvgl@^7.7.2

test_framework = unity


