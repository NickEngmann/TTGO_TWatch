[platformio]
default_envs = native

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = -DDISABLE_DIAGNOSTIC_OUTPUT
lib_deps = bodmer/TFT_eSPI@^2.5.43

[env:native]
platform = native
build_flags =
    -DNATIVE_BUILD
    -DLV_CONF_INCLUDE_SIMPLE
    -std=c++17
    -DDISABLE_DIAGNOSTIC_OUTPUT
    -I src
    -I src/lvgl
build_src_filter = +<lvgl/>
test_build_src = true
lib_deps =
    throwtheswitch/Unity@^2.6.1
build_unflags = -std=gnu++11
