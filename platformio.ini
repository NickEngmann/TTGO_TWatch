;PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library s
;   Folder options: extra paths
;

[env:twatch2020v3]
platform = espressif32@6.0.0
board = twatch2020v3
framework = arduino

; Arduino Core 2.0.14 for stability with PSRAM
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio
board_build.partitions = default

; PSRAM Configuration - 8MB PSRAM for ESP32-D0WDQ6-V3
build_flags =
    -DPSRAM_SIZE=0x500000
    -DPSRAM_TYPE=PSRAM_TYPE_OCTAL
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLOAD_GLCD=1
    -DLILYGO_WATCH_HAS_DISPLAY
    -DLVGL_LITE=1
    -DLV_COLOR_DEPTH=16
    -DLV_MEM_SIZE=0x20000
    -DLV_USE_LOG=0
    -DLV_USE_ASSERT_MEMORY=0
    -DLV_USE_ASSERT_STYLE=0
    -DLV_USE_ASSERT_WIDGET=0
    -DLV_USE_ASSERT_LABEL=0
    -DLV_USE_ASSERT_IMG=0
    -DLV_USE_ASSERT_TXT=0
    -DLV_USE_ASSERT_WIDGET_LIST=0
    -DLV_USE_ASSERT_DRAW=0
    -DLV_USE_ASSERT_POS=0
    -DLV_USE_ASSERT_ANIMATION=0
    -DLV_USE_ASSERT_INDEV=0
    -DLV_USE_ASSERT_TASK=0
    -DLV_USE_ASSERT_PRV=0
    -DLV_USE_ASSERT_OBJ=0
    -DLV_USE_ASSERT_MEM_INTEGRITY=0
    -DLV_USE_ASSERT_IMG_DEC=0

lib_deps = 
    bodmer/TFT_eSPI@^2.5.37
    lvgl/lvgl@^7.7.2
    Xinyuan-LilyGO/AXP202X_Library@^1.1.0
    Xinyuan-LilyGO/TTGO_TWatch_Library@^1.0.0

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_unflags = 
    -Os

build_type = release

