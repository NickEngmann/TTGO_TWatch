[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_flags = 
    -D PIO_FRAMEWORK_ARDUINO_LIBRARIES=1
    -D PIO_BUILD_NO_LIBS=0
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -DDISABLE_DIAGNOSTIC_OUTPUT

lib_deps = 
    lvgl/lvgl@8.3.9
    bodmer/TFT_eSPI@2.4.64
    ESP32AudioI2S/ESP32-AudioI2S@^1.4.0
    opus/opus@^1.3.1

build_unflags = 
    -std=gnu++11

build_flags = 
    -std=gnu++17
