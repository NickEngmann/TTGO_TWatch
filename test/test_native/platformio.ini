[env:native_audio]
platform = native
framework =
board = native
build_flags = 
    -DNATIVE_BUILD
    -I${project.dir}/src
lib_deps =
test_build_src = true
build_src_filter = 
    +<*.cpp>
    +<*.c>
    -<TTGO.cpp>
    -<TTGOWatch.cpp>
    -<Display/>
    -<Touch/>
    -<Power/>
    -<Bluetooth/>
    -<WiFi/>
    -<I2C/>
    -<SPI/>
    -<SDCard/>
    -<MPU6050/>
    -<MP3/>
    -<Buzzer/>
    -<Camera/>
    -<Flash/>
    -<LVGL/>
    -<Time/>
    -<Calendar/>
    -<Alarm/>
    -<Music/>
    -<Photo/>
    -<Video/>
    -<Clock/>
    -<Settings/>
    -<Menu/>
    -<About/>
    -<Example/>
    -<test/>
build_unflags = -DLILYGO_WATCH_2020_V3

